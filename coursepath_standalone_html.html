<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CoursePath — BCom Progression Planner</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useMemo, useState } = React;

    const motion = new Proxy({}, {
      get: (_, tag) => (props = {}) => {
        const { children, layout, initial, animate, transition, whileHover, whileTap, ...rest } = props;
        return React.createElement(tag, rest, children);
      }
    });

    const IconText = ({ children, size = 18, className = "" }) => (
      <span className={className} style={{ fontSize: size, lineHeight: 1, display: "inline-flex", alignItems: "center" }}>{children}</span>
    );

    const ArrowRight = (props) => <IconText {...props}>→</IconText>;
    const ChevronRight = (props) => <IconText {...props}>›</IconText>;
    const Search = (props) => <IconText {...props}>⌕</IconText>;
    const BookOpen = (props) => <IconText {...props}>📖</IconText>;
    const CalendarDays = (props) => <IconText {...props}>📅</IconText>;
    const CheckCircle2 = (props) => <IconText {...props}>✓</IconText>;
    const Clock = (props) => <IconText {...props}>◷</IconText>;
    const GraduationCap = (props) => <IconText {...props}>🎓</IconText>;
    const Sparkles = (props) => <IconText {...props}>✦</IconText>;
    const Target = (props) => <IconText {...props}>◎</IconText>;
    const XCircle = (props) => <IconText {...props}>×</IconText>;

    // Paste your current React app code below this line.
    // Remove these import lines from the top of your React file:
    // import React...
    // import { motion }...
    // import { ArrowRight... }...
    // Also change: export default function McGillBComPlanner()
    // to: function McGillBComPlanner()

    function McGillBComPlanner() {
      return (
        <div className="min-h-screen bg-[#f7f5f1] p-10 text-neutral-950">
          <h1 className="font-serif text-5xl font-black">CoursePath HTML shell ready</h1>
          <p className="mt-4 max-w-2xl leading-8 text-neutral-600">
            Paste the full app code from your React file into this HTML file where indicated, then open this file in your browser.
          </p>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<McGillBComPlanner />);
  </script>
</body>
